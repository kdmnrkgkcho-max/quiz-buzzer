<!DOCTYPE html>
<html>
<head>
  <title>早押し判定ボード</title>
  <script src="https://js.pusher.com/8.0/pusher.min.js"></script>
  <style>
    body { font-family: sans-serif; text-align: center; background: #f0f0f0; }
    #result { font-size: 3em; color: #ff4757; margin-top: 50px; }
    .log { margin-top: 20px; color: #666; }
  </style>
</head>
<body>
  <h1>早押しクイズ・判定ボード</h1>
  <div id="result">準備完了！</div>
  <div id="log" class="log">ここに履歴が出ます</div>

  <script>
    // Pusherの初期設定
    const pusher = new Pusher('12ca5cba0934332011a7', {
      cluster: 'ap3',
      forceTLS: true
    });

    const channel = pusher.subscribe('quiz-channel');

    channel.bind('buzzer-event', function(data) {
      // 届いたデータが文字列ならそのまま、オブジェクトなら .name を使う
      let name = "";
      if (typeof data === 'string') {
        try {
          // 文字列がJSON形式の場合を考慮
          const parsed = JSON.parse(data);
          name = parsed.name || "不明";
        } catch(e) {
          name = data; // 普通の文字列ならそのまま
        }
      } else {
        name = data.name || "不明";
      }

      // 画面に表示
      document.getElementById('result').innerText = name + " さんが押した！";
      
      const log = document.createElement('div');
      log.innerText = new Date().toLocaleTimeString() + " : " + name;
      document.getElementById('log').prepend(log);
    });
  </script>
</body>
</html>
